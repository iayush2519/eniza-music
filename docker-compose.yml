# Local development infrastructure only. Nothing here is deployed as-is —
# see docs/architecture/backend-architecture.md ("AWS-readiness without
# AWS lock-in for local dev"): Postgres -> RDS, Redis -> ElastiCache,
# MinIO -> S3 in any real deployment, provisioned via Terraform in a later
# phase.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: music_app
      POSTGRES_PASSWORD: music_app
      POSTGRES_DB: music_app
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U music_app']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: music_app
      MINIO_ROOT_PASSWORD: music_app_secret
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  minio-data:
