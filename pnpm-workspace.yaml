packages:
  - "apps/*"
  - "packages/*"

# React Native's Metro bundler does not fully support pnpm's default
# symlinked node_modules structure (it doesn't implement Node's package
# exports/symlink resolution the same way Node itself does). Hoisting
# node_modules avoids a class of "module not found" / duplicate-package
# errors in apps/mobile, and on Windows it also keeps native module paths
# short enough for the Android NDK/CMake/Ninja toolchain (CMAKE_OBJECT_PATH_MAX
# is 250 chars; pnpm's isolated node_modules/.pnpm/<pkg>@<version>_<hash>/
# node_modules/<pkg>/... prefix reliably blows past that budget for
# react-native-screens and react-native-worklets, which manifests as
# "ninja: error: manifest 'build.ninja' still dirty after 100 tries").
# This trades some of pnpm's strict isolation for React Native ecosystem
# compatibility, which is the standard, documented approach for RN + pnpm
# monorepos.
#
# NOTE: as of pnpm v11, .npmrc is only read for auth/registry settings; all
# other settings (this one included) must live here instead of .npmrc.
nodeLinker: hoisted
strictPeerDependencies: false
autoInstallPeers: true

# Single source of truth for versions shared across packages/*. apps/mobile
# and apps/api intentionally do NOT consume this catalog: apps/mobile is
# pinned to the TypeScript/ESLint versions Expo's own template ships
# (docs/architecture/tech-stack.md), and apps/api is pinned to the versions
# the Nest CLI generates, on an older ESLint major (see the same doc for
# why eslint-plugin-import currently caps that at ESLint 9.x).
#
# react-native-reanimated / react-native-worklets / expo-image /
# react-native-safe-area-context are pinned here to match the exact
# versions apps/mobile installs, so packages/design-system (which uses
# Reanimated for motion, expo-image for Avatar, and safe-area-context for
# Toast) can never drift onto a different native binary version than the
# app that loads it.
catalog:
  typescript: 5.9.3
  eslint: 10.7.0
  rimraf: 6.0.1
  react: 19.2.3
  react-native: 0.86.0
  react-native-reanimated: 4.5.0
  react-native-worklets: 0.10.0
  expo-image: ~57.0.1
  react-native-safe-area-context: ~5.7.0

allowBuilds:
  esbuild: true
  # Optional native accelerator for bullmq's msgpackr dependency; msgpackr
  # has a pure-JS fallback, so declining this build script has no
  # functional impact and avoids running an unreviewed native build step.
  msgpackr-extract: false
  # Next.js's optional image-optimization dependency, pulled in by
  # apps/web. Declined for the same reason as msgpackr-extract above:
  # sharp has a pure-JS/WASM fallback, and apps/web doesn't use remote
  # image optimization (next.config.ts sets `images.remotePatterns: []`)
  # — there is no functional loss, and it avoids running an unreviewed
  # native build step.
  sharp: false
  unrs-resolver: true

minimumReleaseAgeExclude:
  - bullmq@5.80.7
